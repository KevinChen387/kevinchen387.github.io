    <!--JavaScript-->
    <script>
      function write_music(name, file) {
        document.write('\
        <p>\n\
        <h2>' + name + '</h2>\n\
        <audio controls src=' + file + '>\n\
        </audio>\n\
        </p>\n\
        <button>\n\
        <a href=' + file + ' download=' + file + '>Download</a>\n\
        </button>\n\
        <br><br><br>\n\
        </p>');
      }

      write_music("Alpha", "alpha.mp3");
      write_music("Oblivion", "oblivion.mp3");
      write_music("Odyssey", "odyssey.mp3");
      write_music("Once Upon a Time", "once_upon_a_time.mp3");
      write_music("Reverie", "reverie.mp3");
      write_music("The Grid", "the_grid.mp3");
      write_music("The Phoenix", "the_phoenix.mp3");
    </script>
